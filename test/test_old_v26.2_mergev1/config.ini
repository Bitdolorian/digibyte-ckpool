# These environment variables are set by the build process and read by
# test/functional/test_runner.py and test/util/digibyte-util-test.py

[environment]
PACKAGE_NAME=DigiByte Core
PACKAGE_BUGREPORT=https://github.com/digibyte/digibyte/issues
SRCDIR=/home/jared/Code/digibyte
BUILDDIR=/home/jared/Code/digibyte
EXEEXT=
RPCAUTH=/home/jared/Code/digibyte/share/rpcauth/rpcauth.py

[components]
# Which components are enabled. These are commented out by `configure` if they were disabled when running config.
ENABLE_WALLET=true
USE_SQLITE=true
USE_BDB=true
ENABLE_CLI=true
ENABLE_DIGIBYTE_UTIL=true
ENABLE_WALLET_TOOL=true
ENABLE_DIGIBYTED=true
ENABLE_FUZZ_BINARY=true
ENABLE_ZMQ=true
ENABLE_EXTERNAL_SIGNER=true
#ENABLE_USDT_TRACEPOINTS=true
